name: CI

on: [ push ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.2', '8.3', '8.4', '8.5' ]
    steps:
      - uses: actions/checkout@v3
      - uses: php-actions/composer@v6

      - name: Run tests
        run: php vendor/bin/codecept run
