name: CI
on:
    pull_request:
      branches-ignore: gh-pages
    push:
      branches-ignore: gh-pages

jobs:
    acceptance_tests:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          php-versions: ['8.2', '8.3', '8.4', '8.5' ]
      steps:
        - name: Checkout
          uses: actions/checkout@v2
        - name: Codeception
          uses: joelwmale/codeception-action@v1
