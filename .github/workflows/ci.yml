name: CI
on:
    pull_request:
      branches-ignore: gh-pages
    push:
      branches-ignore: gh-pages

jobs:
    acceptance_tests:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          php-versions: ['8.2', '8.3', '8.4', '8.5' ]
      steps:
        - uses: actions/checkout@v2
        - uses: php-actions/composer@v6
        - uses: joelwmale/codeception-action@master
